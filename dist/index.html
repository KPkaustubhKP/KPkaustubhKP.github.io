<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KP. | Hardware & VLSI Engineer</title>
    <meta name="description" content="Kaustubh Pandey — VLSI, FPGA, PCB Design. MIT Manipal." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary:           '#c91b68',
              'primary-hover':   '#e8206f',
              hover:             '#809fff',
              dim:               '#c7cacc',
              'bg-dark':         '#000000',
              'bg-card':         '#0d0d0d',
              'bg-light':        '#f0ede8',
              'border-subtle':   '#1a1a1a',
            },
            fontFamily: {
              mono: ["'JetBrains Mono'", 'monospace'],
              sans: ["'JetBrains Mono'", 'monospace'],
            },
          },
        },
      };
    </script>

    <style>
      /* ── Base reset ─────────────────────────────────────────── */
      *, *::before, *::after {
        font-family: 'JetBrains Mono', monospace;
        cursor: crosshair !important;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        padding-bottom: 28px;
        overflow-x: hidden;
      }
      ::selection {
        background: rgba(201, 27, 104, 0.2);
        color: #c91b68;
      }

      /* ── Scrollbar ─────────────────────────────────────────── */
      ::-webkit-scrollbar            { width: 2px; height: 2px; }
      ::-webkit-scrollbar-track      { background: transparent; }
      ::-webkit-scrollbar-thumb      { background: rgba(201,27,104,0.35); }

      /* ── Noise film overlay ────────────────────────────────── */
      .noise {
        position: fixed; inset: 0; pointer-events: none; z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        opacity: 0.028;
      }

      /* ── Particle float ────────────────────────────────────── */
      @keyframes float-a {
        0%,100%{ transform:translate(0,0) } 33%{ transform:translate(14px,-28px) } 66%{ transform:translate(-10px,14px) }
      }
      @keyframes float-b {
        0%,100%{ transform:translate(0,0) } 40%{ transform:translate(-18px,22px) } 70%{ transform:translate(16px,-16px) }
      }
      @keyframes float-c {
        0%,100%{ transform:translate(0,0) } 50%{ transform:translate(10px,-22px) }
      }
      .particle-a { animation: float-a 16s ease-in-out infinite; }
      .particle-b { animation: float-b 20s ease-in-out infinite; animation-delay: -6s; }
      .particle-c { animation: float-c 24s ease-in-out infinite; animation-delay: -10s; }

      /* ── Cursor blink ──────────────────────────────────────── */
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .cursor-blink { animation: blink 1.1s step-end infinite; }

      /* ── Node pulse ────────────────────────────────────────── */
      @keyframes node-ring {
        0%,100%{ box-shadow:0 0 0 0 rgba(201,27,104,0.5) }
        50%{ box-shadow:0 0 0 8px rgba(201,27,104,0) }
      }
      .node-pulse { animation: node-ring 2.8s ease-in-out infinite; }

      /* ── Loading dots ──────────────────────────────────────── */
      @keyframes dot-bounce {
        0%,80%,100%{ transform:scale(1); opacity:0.4 }
        40%{ transform:scale(1.8); opacity:1 }
      }
      .dot-1 { animation: dot-bounce 1.4s ease-in-out infinite; }
      .dot-2 { animation: dot-bounce 1.4s ease-in-out infinite 0.2s; }
      .dot-3 { animation: dot-bounce 1.4s ease-in-out infinite 0.4s; }

      /* ── Terminal chrome ───────────────────────────────────── */
      .terminal-window {
        background: rgba(5, 5, 5, 0.98);
        border: 1px solid rgba(201, 27, 104, 0.18);
        font-family: 'JetBrains Mono', monospace;
        font-size: 11.5px;
        line-height: 1.75;
      }

      /* ── Horizontal project scroll ─────────────────────────── */
      .project-scroll {
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .project-scroll::-webkit-scrollbar { display: none; }
      .project-card-snap { scroll-snap-align: start; }

      /* ── Underline slide hover ─────────────────────────────── */
      .ul-slide { position: relative; }
      .ul-slide::after {
        content: ''; position: absolute; left: 0; bottom: -1px;
        width: 0; height: 1px;
        background: #c91b68;
        transition: width 0.3s ease;
      }
      .ul-slide:hover::after { width: 100%; }

      /* ── Section heading reveal ────────────────────────────── */
      @keyframes reveal-up {
        from { clip-path: inset(100% 0 0 0); opacity: 0; transform: translateY(10px); }
        to   { clip-path: inset(0% 0 0 0);  opacity: 1; transform: translateY(0); }
      }
      .reveal-heading { animation: reveal-up 0.7s cubic-bezier(0.22,1,0.36,1) both; }

      /* ── Blog card ─────────────────────────────────────────── */
      .blog-card {
        transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
      }
      .blog-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(201,27,104,0.08);
      }

      /* ═══════════════════════════════════════════════════════
         EASTER EGG CSS
      ═══════════════════════════════════════════════════════ */

      /* ── LOVE / ROSE MODE (8s) ─────────────────────────────── */
      html[data-egg="love"] .text-primary  { color: #ff2d78 !important; }
      html[data-egg="love"] .border-primary { border-color: #ff2d78 !important; }
      html[data-egg="love"] .bg-primary    { background-color: #ff2d78 !important; }

      html[data-egg="love"] body::before {
        content: '';
        position: fixed; inset: 0;
        pointer-events: none; z-index: 9996;
        background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(255,30,110,0.18) 0%, transparent 65%);
        animation: loveGlow 8.5s ease-in-out forwards;
      }
      @keyframes loveGlow {
        0%   { opacity: 0 }
        12%  { opacity: 1 }
        80%  { opacity: 1 }
        100% { opacity: 0 }
      }

      /* Heart rain particles */
      html[data-egg="love"] body::after {
        content: '♥ ♥ ♥ ♥ ♥';
        position: fixed; top: -50px; left: 0; right: 0;
        font-size: 24px; color: rgba(255,45,120,0.4);
        pointer-events: none; z-index: 9994;
        text-align: center; letter-spacing: 4rem;
        animation: heartFall 3s ease-in forwards, heartFadeOut 8s 0s linear forwards;
        white-space: nowrap; overflow: hidden;
      }
      @keyframes heartFall {
        0%   { transform: translateY(-60px); }
        100% { transform: translateY(100vh); }
      }
      @keyframes heartFadeOut {
        0%,70% { opacity: 1 }
        100%   { opacity: 0 }
      }

      /* ── MATRIX MODE (10s) ─────────────────────────────────── */
      html[data-egg="matrix"] .text-primary   { color: #00ff41 !important; }
      html[data-egg="matrix"] .border-primary { border-color: #00ff41 !important; }
      html[data-egg="matrix"] .bg-primary     { background-color: #00ff41 !important; }
      html[data-egg="matrix"] body {
        transition: filter 0.4s;
        filter: hue-rotate(100deg) saturate(1.4) brightness(0.85);
      }
      html[data-egg="matrix"] body::before {
        content: '';
        position: fixed; inset: 0;
        pointer-events: none; z-index: 9994;
        background: rgba(0, 20, 2, 0.5);
        animation: matrixIn 10s ease-in-out forwards;
      }
      @keyframes matrixIn {
        0%   { opacity: 0 }
        8%   { opacity: 1 }
        85%  { opacity: 1 }
        100% { opacity: 0 }
      }

      /* ── HACK MODE (5s) ────────────────────────────────────── */
      html[data-egg="hack"] body {
        filter: hue-rotate(60deg) saturate(1.6) brightness(0.9);
        transition: filter 0.3s;
      }

      /* ── GLITCH flash ──────────────────────────────────────── */
      @keyframes glitch-flash {
        0%,100% { clip-path: inset(0 0 95% 0); }
        20%     { clip-path: inset(20% 0 40% 0); }
        40%     { clip-path: inset(60% 0 20% 0); }
        60%     { clip-path: inset(80% 0 5% 0); }
      }

      /* ── Light mode adjustments ────────────────────────────── */
      html:not(.dark) nav {
        background: rgba(240,237,232,0.93) !important;
        border-color: #e0dbd5 !important;
      }
      html:not(.dark) .terminal-window {
        background: rgba(8,8,8,0.98);
      }
    </style>
    <script type="module" crossorigin src="./assets/index-Bxs41hxq.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C7g7wae5.css">
  </head>
  <body class="bg-bg-light dark:bg-bg-dark text-zinc-700 dark:text-dim transition-colors duration-300 overflow-x-hidden">
    <div class="noise"></div>
    <div id="root"></div>
  </body>
</html>
